# Base Configuration File
# This contains common settings shared across all models
# Model-specific configs will extend/override parts of this config

defaults:
  - trainer: default
  - _self_

# --------------------------------------
# General settings
# --------------------------------------
experiment_name: "unconfigured_experiment"

stage: "train"
seed: 42
load_checkpoint_path: null # Only used for prediction and evaluation
execution:
  num_waypoints_to_predict: null
  num_trajectories_to_predict: null
  num_visualized_traj: 20
  terminal_area_m: 5000.0       # Radius around runway threshold defining the zone in which the trajectory is allowed to end
  delta_epsilon: 1100.0         # Speed floor (m/step) for end-of-trajectory detection (~70 knots at 30 s intervals)
  min_consecutive_steps: 3      # Consecutive sub-epsilon steps required to trigger the delta-floor end detector
  multi_agent_prediction: false
  max_num_agents: 8

# --------------------------------------
# Callbacks
# --------------------------------------
callbacks:
  checkpoint:
    _target_: pytorch_lightning.callbacks.ModelCheckpoint
    dirpath: ".outputs"
    filename: "{epoch}-{val_loss:.2f}"
    monitor: "val_loss"
    mode: "min"
    save_top_k: 1
    save_last: true

  early_stopping:
    _target_: pytorch_lightning.callbacks.EarlyStopping
    monitor: "val_loss"
    mode: "min"
    patience: 20
    min_delta: 0.001

  learning_rate_monitor:
    _target_: pytorch_lightning.callbacks.LearningRateMonitor
    logging_interval: "epoch"

# --------------------------------------
# Data processing
# --------------------------------------
dataloader:
  _target_: torch.utils.data.DataLoader
  batch_size: 3072
  num_workers: 4
  pin_memory: true
  shuffle: true
  drop_last: false

data_processing:
  validation_percentage: 0.2

# --------------------------------------
# Optimizer
# --------------------------------------
optimizer:
  _target_: torch.optim.AdamW
  lr: 1e-3
  weight_decay: 0.01

# --------------------------------------
# Loss
# --------------------------------------
loss:
  ade:
    enabled: true
    use_3d: false
  fde:
    enabled: true
    use_3d: true
  rtd:
    enabled: true
  altitude:
    enabled: true
  localizer:
    enabled: true
    num_waypoints: 6
  glideslope:
    enabled: false
    num_waypoints: 6
  turn_rate:
    enabled: true
    dt_seconds: 30.0

# --------------------------------------
# Weights and Biases
# --------------------------------------
wandb:
  _target_: pytorch_lightning.loggers.WandbLogger
  project: "Approach Prediction"
  name: ${experiment_name}
  tags: []

# --------------------------------------
# Hydra configuration
# --------------------------------------
hydra:
  run:
    dir: .outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}_${experiment_name}
